site_name: OpenQP Manual 1.2.0
site_description: User manual for the Open Quantum Platform
site_url: https://open-quantum-platform.github.io/openqp-docs/
repo_url: https://github.com/Open-Quantum-Platform/openqp-docs
repo_name: Open-Quantum-Platform/openqp-docs
edit_uri: edit/main/docs/

extra:
  manual_version: "1.2.0"
  openqp_version: "1.2.0"

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - Installation: installation.md
  - Build Options: build-options.md
  - Quickstart: quickstart.md
  - Input File Format: input-file.md
  - Capabilities: capabilities.md
  - Performance: performance.md
  - Run from Python: python-scripting.md
  - Workflows:
      - HF and DFT: workflows/hf-dft.md
      - TDDFT and TDHF: workflows/tddft.md
      - SF-TDDFT: workflows/sf-tddft.md
      - MRSF-TDDFT: workflows/mrsf-tddft.md
      - Hessian and Frequencies: workflows/hessian.md
      - Optimization: workflows/optimization.md
      - Spin-Orbit Coupling: workflows/soc.md
      - NACME: workflows/nacme.md
      - PCM/ddX: workflows/pcm.md
      - MRSF-EKT: workflows/ekt.md
      - NMR, IR, and Raman: workflows/nmr-ir-raman.md
  - Keywords:
      - Overview: keywords/index.md
      - input: keywords/input.md
      - guess: keywords/guess.md
      - scf: keywords/scf.md
      - dftgrid: keywords/dftgrid.md
      - tdhf: keywords/tdhf.md
      - properties: keywords/properties.md
      - hess: keywords/hess.md
      - nac: keywords/nac.md
      - ekt: keywords/ekt.md
      - optimize: keywords/optimize.md
      - oqp: keywords/oqp.md
      - geometric: keywords/geometric.md
      - neb: keywords/neb.md
      - pcm: keywords/pcm.md
      - symmetry: keywords/symmetry.md
  - References: references.md
  - Examples: examples/index.md
  - Troubleshooting: troubleshooting.md
  - API:
      - Overview: api/index.md
      - Python API: api/python-runner.md
      - Results and Molecule Data: api/results.md
      - Input Validation: api/input-validation.md
  - Developer Guide:
      - Overview: developers/index.md
      - Contributing to OpenQP: developers/contributing.md
      - Native Interface: developers/native-interface.md
      - Data Tags and Tagarray: developers/tagarray.md
      - Regression References and Registry: developers/regression-references.md
